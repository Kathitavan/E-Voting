services:
  - type: web
    name: evoting-backend
    runtime: python
    region: singapore
    rootDir: backend

    pythonVersion: "3.11.9"

    # No apt-get — Render free tier has read-only filesystem for apt
    # dlib 19.24.2 has a pre-built wheel for Python 3.11 Linux x86_64
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"

    disk:
      name: evoting-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1