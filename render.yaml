services:
  - type: web
    name: evoting-backend
    runtime: python
    region: singapore

    rootDir: backend

    buildCommand: >-
      apt-get update -qq &&
      apt-get install -y -qq cmake build-essential libopenblas-dev liblapack-dev libx11-dev &&
      pip install --upgrade pip &&
      pip install -r requirements.txt

    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"

    disk:
      name: evoting-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1